{% extends 'base.html' %}

{% block content %}
<h2>控制面板</h2>
<p>欢迎回来，{{ current_user.username }}！</p>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">您的设备</div>
            <div class="card-body">
                {% if devices %}
                <ul class="list-group">
                    {% for device in devices %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        {{ device.model_name }} ({{ device.model_number }})
                        <a href="{{ url_for('list_firmwares', device_id=device.id) }}" class="btn btn-sm btn-primary">查看固件</a>
                    </li>
                    {% endfor %}
                </ul>
                {% else %}
                <p>您还没有添加任何设备。</p>
                {% endif %}
                <div class="mt-3">
                    <a href="{{ url_for('add_device') }}" class="btn btn-success">添加设备</a>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">快速操作</div>
            <div class="card-body">
                <div class="d-grid gap-2">
                    <a href="{{ url_for('list_devices') }}" class="btn btn-outline-primary">管理设备</a>
                    <a href="{{ url_for('list_firmwares') }}" class="btn btn-outline-primary">管理固件</a>
                    <a href="{{ url_for('upload_firmware') }}" class="btn btn-outline-primary">上传固件</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
